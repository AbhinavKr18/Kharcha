<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2126;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0ede8;
      --muted: #7a7f8a;
      --accent: #c8f04a;
      --accent-dim: rgba(200,240,74,0.12);
      --red: #ff5f5f;
      --red-dim: rgba(255,95,95,0.12);
      --amber: #ffb347;
      --amber-dim: rgba(255,179,71,0.12);
      --blue: #5fb8ff;
      --blue-dim: rgba(95,184,255,0.12);
      --teal: #4af0c0;
      --teal-dim: rgba(74,240,192,0.12);
      --pink: #f07aff;
      --pink-dim: rgba(240,122,255,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      font-size: 15px;
    }

    /* --- LAYOUT --- */
    .app { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* --- HEADER --- */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .header-left h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .header-left h1 span { color: var(--accent); }
    .header-left p { font-size: 13px; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
    .month-nav { display: flex; align-items: center; gap: 8px; }
    .month-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .month-nav button:hover { border-color: var(--border2); color: var(--text); }
    .month-label { font-size: 14px; font-weight: 600; min-width: 100px; text-align: center; color: var(--text); font-family: 'DM Mono', monospace; }

    /* --- SALARY BAR --- */
    .salary-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .salary-bar label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
    .salary-input-wrap { display: flex; align-items: center; gap: 6px; }
    .salary-input-wrap span { font-size: 20px; font-weight: 600; color: var(--muted); }
    .salary-input-wrap input {
      background: transparent;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      width: 160px;
      outline: none;
    }
    .salary-input-wrap input:focus { border-bottom: 1px solid var(--accent); }

    /* --- SUMMARY CARDS --- */
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
    }
    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
    .card-value { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .card-value.accent { color: var(--accent); }
    .card-value.red { color: var(--red); }
    .card-value.safe { color: var(--teal); }

    /* --- PROGRESS --- */
    .progress-wrap { margin-bottom: 2rem; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
    .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    /* --- SECTION TITLE --- */
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

    /* --- ADD EXPENSE FORM --- */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 1.25rem;
      display: grid;
      grid-template-columns: 120px 1fr 105px 100px 40px;
      gap: 8px;
      align-items: center;
    }
    .add-form input, .add-form select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      outline: none;
      width: 100%;
      height: 36px;
      transition: border-color 0.15s;
    }
    .add-form input:focus, .add-form select:focus { border-color: var(--border2); }
    .add-form select option { background: var(--surface2); }
    .add-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      color: #0e0f11;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .add-btn:hover { opacity: 0.85; }
    .add-btn:active { transform: scale(0.95); }

    /* --- EXPENSE LIST --- */
    .expense-list-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .expense-row {
      display: grid;
      grid-template-columns: 90px 1fr 90px 80px 32px;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .expense-row:last-child { border-bottom: none; }
    .expense-row:hover { background: var(--surface2); }
    .exp-date { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .exp-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tag {
      font-size: 10px; font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }
    .tag-food { background: var(--amber-dim); color: var(--amber); }
    .tag-drink { background: var(--blue-dim); color: var(--blue); }
    .tag-transport { background: var(--teal-dim); color: var(--teal); }
    .tag-entertainment { background: var(--pink-dim); color: var(--pink); }
    .tag-shopping { background: var(--accent-dim); color: var(--accent); }
    .tag-health { background: var(--red-dim); color: var(--red); }
    .tag-other { background: rgba(255,255,255,0.06); color: var(--muted); }
    .exp-amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); text-align: right; }
    .del-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 18px; line-height: 1;
      padding: 0; display: flex; align-items: center; justify-content: center;
      transition: color 0.12s;
    }
    .del-btn:hover { color: var(--red); }
    .empty-state { padding: 2.5rem; text-align: center; color: var(--muted); font-size: 14px; }

    /* --- CATEGORY BREAKDOWN --- */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 1.25rem; }
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.9rem 1rem;
    }
    .cat-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
    .cat-val { font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }
    .cat-count { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* --- FOOTER --- */
    footer { text-align: center; margin-top: 3rem; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* --- RESPONSIVE --- */
    @media (max-width: 600px) {
      .summary { grid-template-columns: repeat(3, 1fr); }
      .card-value { font-size: 16px; }
      .add-form { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto; }
      .add-form input[type="date"] { grid-column: 1; }
      .add-form input[type="text"] { grid-column: 2; }
      .add-form select { grid-column: 1; }
      .add-form input[type="number"] { grid-column: 2; }
      .add-btn { grid-column: 1 / -1; width: 100%; border-radius: var(--radius-sm); }
      .expense-row { grid-template-columns: 70px 1fr 60px 32px; }
      .exp-amount { display: none; }
      .cat-grid { grid-template-columns: repeat(2, 1fr); }
      header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <h1>budget <span>//</span> tracker</h1>
      <p id="header-sub">loading...</p>
    </div>
    <div class="month-nav">
      <button onclick="prevMonth()">&#8592;</button>
      <span class="month-label" id="month-label">—</span>
      <button onclick="nextMonth()">&#8594;</button>
    </div>
  </header>

  <div class="salary-bar">
    <div>
      <label>Monthly salary</label>
      <div class="salary-input-wrap">
        <span>₹</span>
        <input type="number" id="salary-input" value="40000" min="0" onchange="saveSalary()" oninput="renderSummary()" />
      </div>
    </div>
    <div style="font-size:12px; color:var(--muted); max-width:260px; line-height:1.6;">
      Salary is shared across all months. Edit anytime — changes apply everywhere.
    </div>
  </div>

  <div class="summary">
    <div class="card">
      <div class="card-label">Salary</div>
      <div class="card-value accent" id="sum-salary">₹0</div>
    </div>
    <div class="card">
      <div class="card-label">Spent</div>
      <div class="card-value red" id="sum-spent">₹0</div>
    </div>
    <div class="card">
      <div class="card-label">Remaining</div>
      <div class="card-value safe" id="sum-remaining">₹0</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>budget used</span>
      <span id="pct-label">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="section-head"><span class="section-title">Add expense</span></div>
  <div class="add-form">
    <input type="date" id="inp-date" />
    <input type="text" id="inp-name" placeholder="Description" />
    <select id="inp-cat">
      <option value="food">Food</option>
      <option value="drink">Drink</option>
      <option value="transport">Transport</option>
      <option value="shopping">Shopping</option>
      <option value="entertainment">Entertainment</option>
      <option value="health">Health</option>
      <option value="other">Other</option>
    </select>
    <input type="number" id="inp-amount" placeholder="Amount ₹" min="0" />
    <button class="add-btn" onclick="addExpense()" title="Add">+</button>
  </div>

  <div class="section-head" style="margin-top:1.5rem;">
    <span class="section-title">Expenses</span>
    <span id="exp-count" style="font-size:12px; color:var(--muted); font-family:'DM Mono',monospace;"></span>
  </div>
  <div class="expense-list-wrap">
    <div id="expense-list"></div>
  </div>

  <div class="section-head" style="margin-top:1.75rem;"><span class="section-title">By category</span></div>
  <div class="cat-grid" id="cat-grid"></div>

  <footer>data stored locally on this device &bull; no account needed</footer>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const SALARY_KEY = 'bt_salary';
  const DATA_KEY   = 'bt_expenses';

  let salary = parseFloat(localStorage.getItem(SALARY_KEY)) || 40000;
  let allExpenses = JSON.parse(localStorage.getItem(DATA_KEY) || '[]');
  let nextId = allExpenses.length ? Math.max(...allExpenses.map(e => e.id)) + 1 : 1;

  // Current view month (YYYY-MM)
  const now = new Date();
  let viewYear  = now.getFullYear();
  let viewMonth = now.getMonth(); // 0-indexed

  // Seed with initial expenses if empty
  if (allExpenses.length === 0) {
    allExpenses = [
      { id: nextId++, date: '2026-03-31', name: 'Dinner — Subway chicken sub with meatballs', cat: 'food',  amount: 275 },
      { id: nextId++, date: '2026-03-31', name: 'Coffee grounds medium — Blue Tokai',          cat: 'drink', amount: 630 },
    ];
    // Default view to March since that's where the data is
    viewYear  = 2026;
    viewMonth = 2; // March
    save();
  }

  // ── Persistence ────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem(DATA_KEY,   JSON.stringify(allExpenses));
    localStorage.setItem(SALARY_KEY, salary.toString());
  }

  function saveSalary() {
    salary = parseFloat(document.getElementById('salary-input').value) || 0;
    save();
    render();
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmt(n)    { return '₹' + Math.round(n).toLocaleString('en-IN'); }
  function pad2(n)   { return String(n).padStart(2,'0'); }
  function monthKey(y, m) { return `${y}-${pad2(m+1)}`; }

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun',
                        'Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtDate(d) {
    const [,m,day] = d.split('-');
    return `${parseInt(day)} ${SHORT_MONTHS[parseInt(m)-1]}`;
  }

  const CATS = ['food','drink','transport','shopping','entertainment','health','other'];
  const CAT_LABELS = { food:'Food', drink:'Drink', transport:'Transport',
                       shopping:'Shopping', entertainment:'Entertainment',
                       health:'Health', other:'Other' };

  // ── Month navigation ───────────────────────────────────────────────────────
  function prevMonth() {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
  }
  function nextMonth() {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  }

  function currentMonthExpenses() {
    const key = monthKey(viewYear, viewMonth);
    return allExpenses.filter(e => e.date.startsWith(key));
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const key = monthKey(viewYear, viewMonth);
    document.getElementById('month-label').textContent = `${SHORT_MONTHS[viewMonth]} ${viewYear}`;
    document.getElementById('header-sub').textContent  = `${MONTHS[viewMonth]} ${viewYear}`;
    document.getElementById('salary-input').value      = salary;

    const expenses = currentMonthExpenses();
    const total    = expenses.reduce((s,e) => s + e.amount, 0);
    const rem      = salary - total;
    const pct      = salary > 0 ? Math.min(100, Math.round(total / salary * 100)) : 0;

    document.getElementById('sum-salary').textContent    = fmt(salary);
    document.getElementById('sum-spent').textContent     = fmt(total);
    document.getElementById('sum-remaining').textContent = fmt(rem);
    document.getElementById('sum-remaining').className   = 'card-value ' + (rem < 0 ? 'red' : 'safe');

    document.getElementById('pct-label').textContent = pct + '%';
    const fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';
    fill.style.background = pct > 80 ? '#ff5f5f' : pct > 50 ? '#ffb347' : '#c8f04a';

    // Expenses list
    const sorted = [...expenses].sort((a,b) => b.date.localeCompare(a.date));
    const listEl = document.getElementById('expense-list');
    document.getElementById('exp-count').textContent = sorted.length ? sorted.length + ' item' + (sorted.length>1?'s':'') : '';

    if (sorted.length === 0) {
      listEl.innerHTML = `<div class="empty-state">No expenses for ${MONTHS[viewMonth]} ${viewYear}<br><span style="font-size:11px;">Add your first one above ↑</span></div>`;
    } else {
      listEl.innerHTML = sorted.map(e => `
        <div class="expense-row">
          <span class="exp-date">${fmtDate(e.date)}</span>
          <span class="exp-name" title="${e.name}">${e.name}</span>
          <span class="tag tag-${e.cat}">${CAT_LABELS[e.cat]}</span>
          <span class="exp-amount">${fmt(e.amount)}</span>
          <button class="del-btn" onclick="deleteExpense(${e.id})" title="Delete">×</button>
        </div>`).join('');
    }

    // Category breakdown
    const catEl = document.getElementById('cat-grid');
    catEl.innerHTML = CATS.map(c => {
      const items  = expenses.filter(e => e.cat === c);
      const amount = items.reduce((s,e) => s+e.amount, 0);
      return `
        <div class="cat-card">
          <div class="cat-name">${CAT_LABELS[c]}</div>
          <div class="cat-val">${fmt(amount)}</div>
          <div class="cat-count">${items.length} item${items.length!==1?'s':''}</div>
        </div>`;
    }).join('');
  }

  function renderSummary() {
    salary = parseFloat(document.getElementById('salary-input').value) || 0;
    render();
  }

  // ── Add expense ────────────────────────────────────────────────────────────
  function addExpense() {
    const date   = document.getElementById('inp-date').value;
    const name   = document.getElementById('inp-name').value.trim();
    const cat    = document.getElementById('inp-cat').value;
    const amount = parseFloat(document.getElementById('inp-amount').value);
    if (!date || !name || isNaN(amount) || amount <= 0) {
      document.getElementById('inp-name').focus();
      return;
    }
    allExpenses.push({ id: nextId++, date, name, cat, amount });
    save();
    document.getElementById('inp-name').value   = '';
    document.getElementById('inp-amount').value = '';
    render();
  }

  // ── Delete expense ─────────────────────────────────────────────────────────
  function deleteExpense(id) {
    allExpenses = allExpenses.filter(e => e.id !== id);
    save();
    render();
  }

  // ── Key bindings ───────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('.add-form')) addExpense();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('inp-date').value = today;
  render();
</script>
</body>
</html>
